<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: { "primary": "#0f4d3a" },
            fontFamily: { "display": ["Public Sans", "sans-serif"] },
        },
    },
}
</script>

<title>ลืมรหัสผ่าน</title>
</head>

<body class="bg-gray-100 font-display min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white rounded-xl shadow-xl p-8">
<div class="text-center mb-6">
<h2 class="text-2xl font-bold">ลืมรหัสผ่าน</h2>
<p class="text-sm text-gray-600 mt-2">
กรุณากรอกเลขบัตรประชาชน 13 หลักเพื่อรีเซ็ตรหัสผ่าน
</p>
</div>

<form id="resetForm" class="space-y-6">
<div>
<label class="block text-sm font-medium mb-2">
เลขบัตรประชาชน
</label>

<input id="identity"
maxlength="13"
inputmode="numeric"
class="block w-full px-3 py-3 border rounded-lg bg-gray-50 text-sm"
placeholder="กรอกเลขบัตรประชาชน 13 หลัก"
type="text"/>
</div>

<button class="w-full bg-primary text-white font-bold py-3 px-4 rounded-lg shadow-md"
type="submit">
ส่งลิงก์รีเซ็ตรหัสผ่าน
</button>
</form>
</div>

<!-- ✅ Modal -->
<div id="successModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
<div class="bg-white rounded-xl p-6 w-80 text-center shadow-2xl">
<h3 class="text-lg font-bold mb-3 text-primary">ดำเนินการสำเร็จ</h3>
<p class="text-sm text-gray-600 mb-6">
รีเซ็ตรหัสผ่านแล้วกรุณาตั้งรหัสผ่านใหม่
</p>
<a href="รีเซ็ตรหัสผ่าน.html"
   class="bg-primary text-white px-4 py-2 rounded-lg w-full font-semibold text-center block">
   ตกลง
</a>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("resetForm");
    const input = document.getElementById("identity");
    const modal = document.getElementById("successModal");

    // 🔒 ล็อกให้พิมพ์ได้เฉพาะตัวเลข และไม่เกิน 13 ตัว
    input.addEventListener("input", function () {
        this.value = this.value.replace(/\D/g, "").slice(0, 13);
    });

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        if (input.value.length !== 13) {
            alert("กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก");
            input.focus();
            return;
        }

        modal.classList.remove("hidden");
        modal.classList.add("flex");
        form.reset();
    });

});

function closeModal() {
    const modal = document.getElementById("successModal");
    modal.classList.add("hidden");
}
</script>

</body>
</html>
